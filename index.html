<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">

<title>AI Gesture Voting FINAL</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
width:720px;
border-radius:14px;
}

.vote{
font-size:26px;
margin:8px;
}

button{
padding:10px 20px;
margin:8px;
font-size:16px;
}

#countdown{
font-size:60px;
color:#22c55e;
}

</style>

</head>

<body>

<h2>AI Gesture Voting (Event Stable)</h2>

<div id="countdown"></div>

<video id="video" style="display:none"></video>
<canvas id="canvas"></canvas>

<br>

<button onclick="startVote()">Start Vote</button>
<button onclick="resetVote()">Reset</button>
<button onclick="switchCamera()">Switch Camera</button>

<div class="vote">👍 ใช้บ่อย: <span id="v1">0</span></div>
<div class="vote">👌 เคยใช้: <span id="v2">0</span></div>
<div class="vote">✋ ยังไม่เคยใช้: <span id="v3">0</span></div>

<script>

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

let votes = {thumb:0, ok:0, hand:0}

let voted = false
let votingActive = false

let gestureBuffer = []

let currentStream = null
let useFrontCamera = true
let cameraInitialized = false

function startCamera(){

if(currentStream){
currentStream.getTracks().forEach(track=>track.stop())
}

const constraints = {
video:{
facingMode: useFrontCamera ? 'user' : 'environment'
}
}

return navigator.mediaDevices.getUserMedia(constraints).then(stream=>{
currentStream = stream
video.srcObject = stream
cameraInitialized = true
return stream
}).catch(err=>{
console.error('Camera error:',err)
alert('Camera access denied. Please allow camera access to use this app.')
throw err
})

}

function switchCamera(){
useFrontCamera = !useFrontCamera
startCamera()
}

async function startVote(){

if(!cameraInitialized){
try{
await startCamera()
}catch(err){
return
}
}

voted=false
gestureBuffer=[]

let c = 3

const cd = document.getElementById("countdown")

cd.innerText=c

const timer = setInterval(()=>{

c--

if(c==0){

cd.innerText="GO"
votingActive=true

clearInterval(timer)

setTimeout(()=>cd.innerText="",1000)

}else{

cd.innerText=c

}

},1000)

}

function resetVote(){

votes={thumb:0,ok:0,hand:0}

voted=false
votingActive=false
gestureBuffer=[]

updateUI()

}

const hands = new Hands({
locateFile:(file)=>{
return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
}
})

hands.setOptions({

maxNumHands:6,
modelComplexity:1,
minDetectionConfidence:0.8,
minTrackingConfidence:0.8

})

hands.onResults(results=>{

canvas.width = video.videoWidth
canvas.height = video.videoHeight

ctx.drawImage(video,0,0)

if(!results.multiHandLandmarks) return

let selectedHand=null
let bestDist=999

const cx=0.5
const cy=0.5

results.multiHandLandmarks.forEach(hand=>{

const wrist=hand[0]

const dist=Math.hypot(
wrist.x-cx,
wrist.y-cy
)

if(dist<bestDist){

bestDist=dist
selectedHand=hand

}

})

if(!selectedHand) return

drawConnectors(ctx,selectedHand,HAND_CONNECTIONS)
drawLandmarks(ctx,selectedHand)

const gesture = detectGesture(selectedHand)

if(!gesture) return

gestureBuffer.push(gesture)

if(gestureBuffer.length>12)
gestureBuffer.shift()

const stable = gestureBuffer.every(g=>g===gesture)

if(stable && votingActive && !voted){

votes[gesture]++

voted=true

updateUI()

}

})

function detectGesture(l){

const thumb = l[4].y < l[3].y

const index = l[8].y < l[6].y
const middle = l[12].y < l[10].y
const ring = l[16].y < l[14].y
const pinky = l[20].y < l[18].y

if(thumb && !index && !middle) return "thumb"

const okDist = Math.hypot(
l[4].x-l[8].x,
l[4].y-l[8].y
)

if(okDist < 0.04) return "ok"

if(index && middle && ring && pinky)
return "hand"

return null

}

function updateUI(){

document.getElementById("v1").innerText=votes.thumb
document.getElementById("v2").innerText=votes.ok
document.getElementById("v3").innerText=votes.hand

}

const camera = new Camera(video,{
onFrame: async()=>{
await hands.send({image:video})
},
width:720,
height:540
})

camera.start()

</script>

</body>
</html>
